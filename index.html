<!DOCTYPE html>
<html>
<head>
    <title>My Games</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffd6e8, #ffc2e2);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Hoa bay */
        .flower {
            position: absolute;
            top: -50px;
            font-size: 24px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.6);
            padding: 50px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff4d8d;
            font-size: 40px;
            margin-bottom: 30px;
        }

        a {
            display: block;
            margin: 15px 0;
            padding: 12px 25px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            background: linear-gradient(45deg, #ff7eb9, #ff65a3);
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        a:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff65a3;
        }
    </style>
</head>

<body>

    <!-- Hoa bay -->
    <div class="flower" style="left:10%; animation-duration: 8s;">🌸</div>
    <div class="flower" style="left:25%; animation-duration: 10s;">🌸</div>
    <div class="flower" style="left:40%; animation-duration: 7s;">🌸</div>
    <div class="flower" style="left:60%; animation-duration: 12s;">🌸</div>
    <div class="flower" style="left:75%; animation-duration: 9s;">🌸</div>
    <div class="flower" style="left:90%; animation-duration: 11s;">🌸</div>

    <div class="container">
        <h1>🎮 My Games</h1>

        <a href="memory game.html">Play Memory Game</a>
        <a href="ninjarunner.html">Play Ninja Runner</a>
        <a href="sakuralappy.html">Play Sakura Game</a>
        <a href="thuthachngauhien.html">Play Random Challenge</a>
    </div>

</body>
</html>
