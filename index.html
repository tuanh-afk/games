<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Center</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd1dc, #ffe6f0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      color: #ff4d88;
      margin-bottom: 40px;
    }

    .btn {
      display: block;
      width: 250px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 40px;
      background: linear-gradient(45deg, #ff66a3, #ff3385);
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎮 My Game Center 🎮</h1>

    <!-- Sakura Game -->
    <a class="btn" href="sakuralappy.html">
      🌸 Play Sakura Plappy
    </a>

    <!-- Random Challenge -->
    <a class="btn" href="thuthachngaunhien.html">
      🎲 Play Random Challenge
    </a>

    <!-- Ninja Runner -->
    <a class="btn" href="ninjarunner.html">
      🎮 Play Ninja Runner
    </a>

    <!-- Memory Game -->
    <a class="btn" href="memory game.html">
      🧠 Play Memory Game
    </a>

  </div>
</body>
</html>
